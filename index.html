<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WannaGo — Match over the meal you both really want.</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='8' y1='4' x2='56' y2='62' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23E23744'/%3E%3Cstop offset='1' stop-color='%23C42834'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath fill-rule='evenodd' fill='url(%23g)' d='M32 4C18.745 4 8 14.745 8 28C8 45 32 62 32 62C32 62 56 45 56 28C56 14.745 45.255 4 32 4ZM22 16h2.2v7.2h1.1V16h2.2v7.2h1.1V16h2.2v9c0 2-1.4 3-2.6 3.2V40c0 1.5-.8 2.2-1.8 2.2c-1 0-1.8-.7-1.8-2.2V28.2c-1.2-.2-2.6-1.2-2.6-3.2ZM38.2 16c2.9 1.3 4.3 5 4.3 9.5c0 2.7-1 4.3-3 5V40c0 1.5-.8 2.2-1.9 2.2c-1.1 0-1.9-.7-1.9-2.2V17.8c0-1.2.8-1.8 2.5-1.8Z'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..600;1,9..144,500..600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF8F5; --card:#FFFFFF; --line:#ECE6DD; --line-2:#DDD5C9;
    --ink:#1C1815; --ink-2:#5C544A; --ink-3:#968C7E;
    --red:#E23744; --red-deep:#C42834; --red-soft:#FBEAEB;
    --serif:'Fraunces',Georgia,serif; --sans:'Inter',-apple-system,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5}
  img{display:block;max-width:100%}
  .wrap{max-width:1180px;margin:0 auto;padding:0 24px}
  .kick{font:600 11px var(--sans);letter-spacing:1.8px;text-transform:uppercase;color:var(--red)}
  .btn{display:inline-block;background:var(--red);color:#fff;border:none;border-radius:999px;padding:15px 30px;font:600 15px var(--sans);cursor:pointer;text-decoration:none}
  .btn:hover{background:var(--red-deep)}
  .btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line-2);border-radius:999px;padding:13px 26px;font:500 14px var(--sans);text-decoration:none}
  .src{font:500 10px var(--sans);letter-spacing:.5px;color:var(--ink-3);background:var(--card);border:1px solid var(--line);border-radius:999px;padding:4px 12px;display:inline-block;margin-bottom:14px}

  nav{display:flex;align-items:center;gap:20px;padding:16px 24px;max-width:1180px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:9px;font:600 21px var(--serif);color:var(--ink);text-decoration:none}
  .mark{width:30px;height:30px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:14px}
  nav .sp{flex:1}
  nav a{color:var(--ink-2);text-decoration:none;font-size:14px;font-weight:500}

  /* HERO — Tinder/Bumble: the photo IS the screen */
  .hero{max-width:1180px;margin:8px auto 0;padding:0 24px;display:grid;grid-template-columns:1.05fr .95fr;gap:36px;align-items:center}
  .hero-copy h1{font:600 clamp(38px,5.6vw,64px)/1.04 var(--serif);letter-spacing:-.01em}
  .hero-copy h1 em{font-style:italic;color:var(--red)}
  .hero-copy p{font-size:17px;color:var(--ink-2);margin:20px 0 26px;line-height:1.6;max-width:480px}
  .hero-card{position:relative;border-radius:28px;overflow:hidden;aspect-ratio:3/4;max-height:600px;box-shadow:0 24px 60px rgba(28,24,21,.14)}
  .hero-card img{width:100%;height:100%;object-fit:cover}
  .hero-card .g{position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(20,16,12,.78))}
  .hero-card .nm{position:absolute;left:22px;bottom:20px;color:#fff}
  .hero-card .nm b{font:600 26px var(--sans);display:block}
  .hero-card .nm span{font-size:13px;opacity:.9}
  .hero-card .chip{position:absolute;left:22px;bottom:76px;background:rgba(255,255,255,.92);color:var(--ink);font:600 12px var(--sans);padding:8px 14px;border-radius:999px;display:flex;align-items:center;gap:6px}
  .hero-card .chip .h{color:var(--red)}
  .stat-tiny{font-size:13.5px;color:var(--ink-3)}
  .stat-tiny b{color:var(--ink)}

  .sec{padding:72px 0 0}
  .sec-head{margin-bottom:26px}
  .sec-head h2{font:600 clamp(28px,3.8vw,42px)/1.08 var(--serif);margin-top:10px}
  .sec-head h2 em{font-style:italic;color:var(--red)}
  .sec-head p{color:var(--ink-2);margin-top:10px;max-width:560px;font-size:15px}

  /* PROFILE RAIL — Tinder full-bleed cards, name on scrim */
  .rail{display:flex;gap:16px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none}
  .rail::-webkit-scrollbar{display:none}
  .pcard{flex:0 0 250px;border-radius:22px;overflow:hidden;position:relative;height:350px;background:var(--card);box-shadow:0 10px 30px rgba(28,24,21,.10)}
  .pcard img{width:100%;height:100%;object-fit:cover;object-position:center 22%}
  .pcard .g{position:absolute;inset:0;background:linear-gradient(180deg,transparent 52%,rgba(20,16,12,.82))}
  .pcard .meta{position:absolute;left:17px;right:17px;bottom:15px;color:#fff}
  .pcard .meta b{display:block;font:600 21px var(--sans)}
  .pcard .meta span{font-size:12.5px;opacity:.92}
  .pcard .vv{display:inline-flex;width:16px;height:16px;border-radius:50%;background:#3D9BFF;color:#fff;font-size:10px;align-items:center;justify-content:center;vertical-align:1px;margin-left:4px}
  .pcard .heart{position:absolute;top:13px;right:13px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;color:var(--red);font-size:17px;box-shadow:0 4px 12px rgba(0,0,0,.12)}
  .pslide{flex:0 0 250px;display:flex;flex-direction:column}
  .pslide .pcard{flex:0 0 300px;height:300px;border-radius:22px 22px 0 0;box-shadow:none}
  .pslide .plist{background:var(--card);border-radius:0 0 22px 22px;padding:13px 14px 15px;box-shadow:0 10px 30px rgba(28,24,21,.10)}
  .pslide .plist .lbl{font:600 10px var(--sans);letter-spacing:1px;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px}
  .pslide .plist .prow{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .pslide .plist .prow:last-child{margin-bottom:0}
  .pslide .plist .prow img{width:36px;height:36px;border-radius:9px;object-fit:cover;flex:0 0 36px}
  .pslide .plist .prow .t{min-width:0;flex:1}
  .pslide .plist .prow .t b{display:block;font:600 13px var(--sans);color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pslide .plist .prow .t span{font-size:11px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  .pslide .plist .prow .h{color:var(--red);font-size:13px;flex:0 0 auto}

  /* VENUE GRID — same card language as people */
  .vgrid{display:grid;grid-template-columns:2fr 1fr 1fr;grid-template-rows:210px 210px;gap:16px}
  .vtile{position:relative;border-radius:20px;overflow:hidden;background:var(--card);box-shadow:0 8px 24px rgba(28,24,21,.08)}
  .vtile:first-child{grid-row:span 2}
  .vtile img{width:100%;height:100%;object-fit:cover}
  .vtile .g{position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(20,16,12,.82))}
  .vtile .vm{position:absolute;left:16px;bottom:13px;right:16px;color:#fff}
  .vtile .vm b{display:block;font:600 19px var(--sans)}
  .vtile:first-child .vm b{font-size:27px}
  .vtile .vm span{font-size:12px;opacity:.9}
  .vtile .badge{position:absolute;top:13px;left:13px;background:rgba(255,255,255,.94);color:var(--ink);font:600 10.5px var(--sans);padding:5px 11px;border-radius:999px}
  .vtile .vh{position:absolute;top:11px;right:11px;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;color:var(--red);font-size:15px}

  /* SPLIT */
  .split{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .scard{background:var(--card);border-radius:24px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 12px 34px rgba(28,24,21,.09)}
  .scard .top{position:relative;height:300px}
  .scard .top img{width:100%;height:100%;object-fit:cover;object-position:center 20%}
  .scard .top .g{position:absolute;inset:0;background:linear-gradient(180deg,transparent 52%,rgba(20,16,12,.8))}
  .scard .top .nm{position:absolute;left:20px;bottom:15px;color:#fff}
  .scard .top .nm b{font:600 23px var(--sans)}
  .scard .top .nm span{display:block;font-size:12.5px;opacity:.92}
  .scard .bd{padding:20px 22px 24px;flex:1;display:flex;flex-direction:column}
  .scard .lbl{font:600 10.5px var(--sans);letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px}
  .lrow{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--line)}
  .lrow:last-of-type{border-bottom:none}
  .lrow img{width:46px;height:46px;border-radius:12px;object-fit:cover}
  .lrow .t{flex:1}
  .lrow .t b{font-size:14.5px;font-weight:600;display:block}
  .lrow .t span{font-size:11.5px;color:var(--ink-3)}
  .lrow .h{color:var(--red);font-size:17px}
  .scard .note{font-size:13.5px;color:var(--ink-2);margin:12px 0 16px;line-height:1.55}
  .scard .btn{margin-top:auto;text-align:center}
  .scard .btn.alt{background:var(--ink)}

  /* STEPS — Hinge editorial restraint */
  .stepwrap{background:var(--card);border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-top:72px;padding:64px 0}
  .steps{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .step .n{font:600 15px var(--serif);color:var(--red);margin-bottom:10px}
  .step b{display:block;font:600 18px var(--serif);margin-bottom:6px}
  .step p{font-size:13.5px;color:var(--ink-2);line-height:1.55}

  /* REVIEWS */
  .revs{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  .rev{background:var(--card);border-radius:20px;padding:24px;box-shadow:0 8px 24px rgba(28,24,21,.07)}
  .rev .stars{color:var(--red);letter-spacing:2px;margin-bottom:10px;font-size:14px}
  .rev p{font-size:14px;line-height:1.6;margin-bottom:16px}
  .rev .by{display:flex;align-items:center;gap:10px}
  .rev .by img{width:38px;height:38px;border-radius:50%;object-fit:cover}
  .rev .by span{font-size:13px;font-weight:600;color:var(--ink-2)}

  .finale{text-align:center;padding:90px 24px 80px}
  .finale h2{font:600 clamp(32px,4.8vw,52px)/1.08 var(--serif)}
  .finale h2 em{font-style:italic;color:var(--red)}
  .finale p{color:var(--ink-2);margin:18px auto 26px;max-width:520px;font-size:16px}
  .finale .sub{font-size:13px;color:var(--ink-3);margin-top:16px}

  footer{border-top:1px solid var(--line);padding:26px 24px;text-align:center;color:var(--ink-3);font-size:12px}

  
  

  @media(max-width:900px){
    .hero{grid-template-columns:1fr;gap:26px}
    .hero-card{max-width:420px;margin:0 auto}
    .vgrid{grid-template-columns:1fr 1fr;grid-template-rows:180px 180px 180px}
    .vgrid .vtile:first-child{grid-row:span 1;grid-column:span 2}
    .steps{grid-template-columns:1fr 1fr}
    .revs{grid-template-columns:1fr}
    .split{grid-template-columns:1fr}
  }
  @media(max-width:560px){
    nav a.hide{display:none}
    .steps{grid-template-columns:1fr}
    .vgrid{grid-template-columns:1fr;grid-template-rows:none}
    .vgrid .vtile{height:190px}
    .vgrid .vtile:first-child{grid-column:span 1}
    .pcard{flex-basis:210px;height:300px}
    .pslide{flex-basis:210px}
    .pslide .pcard{flex-basis:255px;height:255px}
  }


/* ═══ APP COMPONENTS — concept vocabulary, single source of truth ═══ */
#app{min-height:60vh}
.container,.page-head{max-width:1080px;margin:0 auto;padding:26px 24px}
.page-head h1{font-size:clamp(28px,4vw,40px)}
.sub{color:var(--ink-2);font-size:15px;margin-top:8px}
.small{font-size:12.5px;color:var(--ink-3)}
.hint{font-size:12px;color:var(--ink-3)}
.eyebrow{font:600 11px var(--sans);letter-spacing:1.8px;text-transform:uppercase;color:var(--red)}
.eyebrow.purple{color:var(--ink-3)}
.icon{width:16px;height:16px;vertical-align:-3px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon.sm{width:13px;height:13px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;background:var(--red);color:#fff;border:none;border-radius:999px;padding:13px 24px;font:600 14.5px var(--sans);cursor:pointer;text-decoration:none}
.btn:hover{background:var(--red-deep)}
.btn-secondary{background:var(--ink)}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line-2)}
.btn-sm{padding:9px 16px;font-size:13px}
.btn-lg{padding:16px 32px;font-size:15.5px}
.btn-block{display:flex;width:100%}
.card,.panel{background:var(--card);border-radius:22px;padding:22px;box-shadow:0 12px 34px rgba(28,24,21,.09);margin-bottom:16px}
.f{display:block;font:600 12.5px var(--sans);color:var(--ink-2);margin:16px 0 6px}
.input{width:100%;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:12px 14px;font:400 14.5px var(--sans);color:var(--ink)}
.input:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px var(--red-soft)}
textarea.input{min-height:84px;resize:vertical}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
.pill{background:#fff;border:1.5px solid var(--line-2);border-radius:999px;padding:8px 14px;font:500 13px var(--sans);color:var(--ink-2);cursor:pointer}
.pill.on{background:var(--red);border-color:var(--red);color:#fff}
.reg-top{display:flex;align-items:center;gap:14px;margin-bottom:30px}
.reg-back{background:none;border:0;color:var(--ink-3);font:500 14px var(--sans);cursor:pointer;padding:4px 2px}
.reg-back:hover{color:var(--ink)}
.reg-track{flex:1;height:4px;background:var(--line);border-radius:99px;overflow:hidden}
.reg-fill{height:100%;background:var(--red);border-radius:99px;transition:width .38s cubic-bezier(.22,1,.36,1)}
.reg-count{font:600 12px var(--sans);color:var(--ink-3);letter-spacing:.4px;white-space:nowrap}
.qstep{animation:qIn .34s cubic-bezier(.22,1,.36,1)}
@keyframes qIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.qstep.in-next{animation:qInNext .38s cubic-bezier(.22,1,.36,1)}
.qstep.in-back{animation:qInBack .38s cubic-bezier(.22,1,.36,1)}
@keyframes qInNext{from{opacity:0;transform:translateX(34px) scale(.985)}to{opacity:1;transform:none}}
@keyframes qInBack{from{opacity:0;transform:translateX(-34px) scale(.985)}to{opacity:1;transform:none}}
.qstep.leaving-next{animation:qOutNext .15s ease-in forwards}
.qstep.leaving-back{animation:qOutBack .15s ease-in forwards}
@keyframes qOutNext{to{opacity:0;transform:translateX(-26px) scale(.985)}}
@keyframes qOutBack{to{opacity:0;transform:translateX(26px) scale(.985)}}
.qh{font:600 clamp(1.7rem,3.4vw,2.5rem) var(--serif);color:var(--ink);line-height:1.15;margin:0 0 8px;letter-spacing:-.5px}
.qh .accent{color:var(--red)}
.chips .pill{animation:chipIn .34s cubic-bezier(.22,1,.36,1) backwards;transition:transform .12s ease,background .16s ease,border-color .16s ease}
@keyframes chipIn{from{opacity:0;transform:translateY(8px) scale(.96)}to{opacity:1;transform:none}}
.pill:active{transform:scale(.94)}
.pill.on{animation:pillPop .26s cubic-bezier(.34,1.56,.64,1)}
@keyframes pillPop{0%{transform:scale(1)}45%{transform:scale(1.11)}100%{transform:scale(1)}}
.qnav .btn{transition:transform .12s ease,box-shadow .2s ease}
.qnav .btn:active{transform:scale(.975)}
.reg-fill{position:relative}
.hwrap{display:flex;align-items:center;border:1.5px solid var(--line-2);border-radius:12px;background:#fff;overflow:hidden;transition:border-color .18s ease,box-shadow .18s ease}
.hwrap:focus-within{border-color:var(--red);box-shadow:0 0 0 4px var(--red-soft)}
.hwrap.ok{border-color:#1FA463}
.hwrap.bad{border-color:var(--red-deep)}
.hwrap .at{padding:0 4px 0 14px;font:600 17px var(--sans);color:var(--ink-3)}
.hwrap input{flex:1;border:0;outline:0;padding:13px 12px 13px 2px;font:500 16px var(--sans);color:var(--ink);background:transparent}
.hwrap .mark{padding-right:14px;font-size:15px;font-weight:700}
.hstat{font-size:12.5px;margin-top:9px;min-height:17px}
.hstat.ok{color:#1FA463}.hstat.bad{color:var(--red-deep)}.hstat.idle{color:var(--ink-3)}
.hpreview{margin-top:20px;padding:16px 18px;border-radius:14px;background:linear-gradient(120deg,var(--red-soft),#fff);border:1px solid var(--line);text-align:center}
.hpreview .l{font:600 10px var(--sans);letter-spacing:1.2px;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px}
.hpreview .p{font:600 20px var(--serif);color:var(--ink)}
.hpreview .p b{color:var(--red)}
.hsugg{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.hsugg button{background:#fff;border:1.5px solid var(--line-2);border-radius:999px;padding:6px 12px;font:500 12.5px var(--sans);color:var(--ink-2);cursor:pointer}
.hsugg button:hover{border-color:var(--red);color:var(--red)}
.cfetti{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.cfetti i{position:absolute;top:-12px;width:9px;height:14px;border-radius:2px;animation:cfall linear forwards}
@keyframes cfall{to{transform:translateY(105vh) rotate(720deg);opacity:.15}}
.qsub{font-size:14.5px;color:var(--ink-2);line-height:1.55;margin:0 0 26px}
.qbody{margin-bottom:8px}
.qnav{display:flex;align-items:center;gap:12px;margin-top:28px}
.qnav .btn{flex:1}
.qskip{background:none;border:0;color:var(--ink-3);font:500 14px var(--sans);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.qskip:hover{color:var(--ink-2)}
.qhint{font-size:12.5px;color:var(--ink-3);margin-top:10px}
.res-box{margin-top:24px;border-radius:14px;padding:16px 18px;border:1.5px solid}
.res-box.warn{background:#FFF8E8;border-color:#EFD9A0}
.res-box.ok{background:#EEF9F2;border-color:#B4E0C6}
.res-hd{display:flex;align-items:center;gap:8px;font:600 15px var(--sans);margin-bottom:6px}
.res-box.warn .res-hd{color:#8A6100}
.res-box.ok .res-hd{color:#12703F}
.res-bd{font-size:13.5px;line-height:1.55;color:var(--ink-2)}
.res-code{margin-top:10px;font:500 13.5px var(--sans);color:var(--ink-2)}
.res-code b{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--ink);letter-spacing:.5px}
.res-confirm{margin-top:4px}
.res-box.busy{background:#F3F1FB;border-color:#CFC6EE}
.res-box.busy .res-hd{color:#4A3B8C}
.res-moved{display:inline-block;margin-left:6px;font-size:11.5px;color:#8A6100;background:#FFF2D6;border-radius:99px;padding:2px 8px}
.spin{width:15px;height:15px;border-radius:50%;border:2px solid #CFC6EE;border-top-color:#4A3B8C;display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pill.tiny{padding:4px 10px;font-size:10.5px}
.when-row{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.err{color:var(--red-deep);font-size:13px;margin-top:10px}
.notice{display:flex;gap:10px;background:var(--red-soft);border-radius:16px;padding:13px 15px;font-size:13.5px;align-items:flex-start}
.badge{display:inline-block;background:var(--red-soft);color:var(--red-deep);border-radius:999px;padding:4px 11px;font:600 11px var(--sans)}
.b-info{background:#EAF1FB;color:#2E6BB0}.b-warning{background:#FBF3E0;color:#8A6410}.b-gold{background:var(--red-soft);color:var(--red-deep)}.b-pink{background:var(--red-soft);color:var(--red-deep)}.b-purple{background:#F0EEE9;color:var(--ink-2)}
.vpill{display:inline-block;background:#E8F3E4;color:#3E7030;border-radius:999px;padding:4px 11px;font:600 11px var(--sans)}
.vtags-row{display:flex;gap:6px;flex-wrap:wrap}
.vtag{display:inline-flex;align-items:center;gap:4px;background:var(--red-soft);color:var(--red-deep);border-radius:999px;padding:5px 11px;font:600 11px var(--sans)}
.vtag.tt,.badge.tt{background:#FF1D6C;color:#fff;box-shadow:0 2px 10px rgba(255,29,108,.35)}
.vtag.ig,.badge.ig{background:linear-gradient(95deg,#FEDA75 0%,#FA7E1E 25%,#D62976 55%,#962FBF 80%,#4F5BD5 100%);color:#fff;box-shadow:0 2px 10px rgba(214,41,118,.32)}
.vtag.tt .ic,.vtag.ig .ic,.badge.tt .ic,.badge.ig .ic{font-size:10px;line-height:1}
.avatar{border-radius:50%;object-fit:cover;border:2px solid #fff}
.face-stack{display:inline-flex}
.face-stack .avatar{margin-right:-9px}
.trend-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.trend-card{background:var(--card);border-radius:18px;overflow:hidden;box-shadow:0 8px 24px rgba(28,24,21,.08);position:relative}
.tc-img{height:150px;background:linear-gradient(135deg,#EDE7DE,#D9D2C6);position:relative}
.tc-img img{width:100%;height:100%;object-fit:cover}
.tc-bd{padding:12px 14px 14px}
.tc-bd b{font-size:14.5px}
.wish-btn{position:absolute;top:10px;right:10px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.95);color:var(--red);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.14)}
.wish-btn.on{background:var(--red);color:#fff}
.mini-heart{color:var(--line-2);cursor:pointer}.mini-heart.on{color:var(--red)}
.trend-row{display:flex;align-items:center;gap:12px;background:var(--card);border-radius:16px;padding:11px 14px;margin-bottom:10px;box-shadow:0 5px 16px rgba(28,24,21,.06)}
.tr-rank{font:600 15px var(--serif);color:var(--ink-3);width:26px}
.tr-img{width:48px;height:48px;border-radius:12px;object-fit:cover}
.tr-noimg{display:inline-flex;width:48px;height:48px;border-radius:12px;align-items:center;justify-content:center;background:linear-gradient(135deg,#EDE7DE,#D9D2C6);color:#fff}
.feed{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
.date-card{background:var(--card);border-radius:22px;overflow:hidden;box-shadow:0 12px 34px rgba(28,24,21,.09)}
.photo{position:relative;height:320px;background:linear-gradient(135deg,#EDE7DE,#D9D2C6)}
.ph-img{width:100%;height:100%;object-fit:cover;object-position:center 20%}
.photo .scrim{position:absolute;inset:0;background:linear-gradient(180deg,transparent 52%,rgba(20,16,12,.82))}
.photo .who{position:absolute;left:16px;bottom:13px;color:#fff}
.photo .who b{font:600 20px var(--sans)}
.bd{padding:16px 18px 20px}
.win-pick{display:flex;align-items:center;gap:10px;background:#fff;border:1.5px solid var(--line);border-radius:14px;padding:11px 13px;margin:6px 0;cursor:pointer;font-size:13.5px}
.win-pick.on{border-color:var(--red);background:var(--red-soft)}
.ticket{max-width:430px;margin:0 auto;background:var(--card);border-radius:24px;overflow:hidden;box-shadow:0 16px 44px rgba(28,24,21,.12)}
.tbody{padding:20px 22px 24px}
.tbody dl{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tbody dt{font:600 10.5px var(--sans);letter-spacing:1.3px;text-transform:uppercase;color:var(--ink-3)}
.tbody dd{font-size:14.5px;margin:3px 0 0}
.venue-banner{position:relative;height:170px}
.venue-banner img{width:100%;height:100%;object-fit:cover}
.vb-scrim{position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(20,16,12,.8))}
.vb-meta{position:absolute;left:16px;bottom:12px;color:#fff}
.vb-meta b{font:600 20px var(--sans)}
.chat-box{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;padding:4px 2px}
.chat-msg{display:flex;flex-direction:column;align-items:flex-start;max-width:78%}
.chat-msg.mine{align-self:flex-end;align-items:flex-end}
.chat-b{background:var(--bg);border-radius:14px 14px 14px 4px;padding:8px 12px;font-size:13.5px}
.chat-msg.mine .chat-b{background:var(--red);color:#fff;border-radius:14px 14px 4px 14px}
.chat-t{font-size:10.5px;color:var(--ink-3);margin-top:3px}
.priv-list{margin:8px 0 12px;padding:0;list-style:none}
.priv-list li{position:relative;padding-left:20px;font-size:12.5px;color:var(--ink-2);margin:4px 0}
.priv-list li::before{content:"✓";position:absolute;left:0;color:#3E7030;font-weight:700}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin:20px 0 26px}
.stat{background:var(--card);border-radius:16px;padding:15px 17px;box-shadow:0 5px 16px rgba(28,24,21,.06)}
.stat .v{font:600 22px var(--serif)}
.stat .l{font-size:11.5px;color:var(--ink-3);margin-top:3px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 18px}
.tabs .btn-ghost{padding:9px 18px}
table.data{width:100%;border-collapse:collapse;background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 5px 16px rgba(28,24,21,.06);font-size:13.5px}
table.data th{text-align:left;background:#F3F0EA;color:var(--ink-2);font:600 10.5px var(--sans);letter-spacing:1px;text-transform:uppercase;padding:11px 14px}
table.data td{padding:11px 14px;border-top:1px solid var(--line)}
td.money{font-weight:600}
.empty{text-align:center;padding:40px 20px;color:var(--ink-3)}
.empty h3{font-family:var(--serif);color:var(--ink);margin-bottom:6px}
.role-cards{display:grid;grid-template-columns:1fr 1fr;gap:18px;max-width:780px;margin:26px auto}
.role-card{background:var(--card);border-radius:22px;padding:26px;box-shadow:0 12px 34px rgba(28,24,21,.09);cursor:pointer;text-decoration:none;color:var(--ink)}
.role-card h3{font-size:21px;margin:0 0 8px}
.role-card p{color:var(--ink-2);font-size:14px;margin-bottom:18px}
.legal-overlay{position:fixed;inset:0;background:rgba(20,16,12,.5);display:flex;align-items:center;justify-content:center;padding:16px;z-index:200}
.legal-card{background:var(--card);border-radius:24px;max-width:640px;width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 24px 60px rgba(28,24,21,.2)}
.legal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line)}
.legal-tabs{display:flex;gap:6px;padding:12px 22px;flex-wrap:wrap;border-bottom:1px solid var(--line)}
.legal-body{padding:18px 22px;overflow-y:auto;font-size:14px;line-height:1.65}
.legal-body h4{font-family:var(--serif);margin:18px 0 6px}
.pf-th{width:68px;height:68px;border-radius:10px;object-fit:cover;cursor:pointer;border:2px solid transparent}
.prof-actions{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;border-radius:999px;padding:12px 22px;font:500 13.5px var(--sans);z-index:300;box-shadow:0 12px 34px rgba(28,24,21,.3)}
.preview-bar{background:#FFF6E8;color:#7A5A16;font-size:12px;padding:8px 16px;text-align:center}
.preview-bar button,.preview-bar a{color:#7A5A16;font-weight:600}
.pick-bar{position:fixed;left:50%;transform:translateX(-50%);bottom:14px;z-index:150;background:var(--ink);color:#fff;border-radius:999px;padding:9px 10px 9px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 14px 40px rgba(28,24,21,.4);max-width:calc(100vw - 24px)}
.pick-bar b{color:#FF9AA3}
.pick-bar .face-stack .avatar{filter:blur(1.6px);border:2px solid var(--ink)}
#nav{display:flex;align-items:center;gap:18px;padding:15px 24px;max-width:1180px;margin:0 auto}
#nav .brand{display:flex;align-items:center;gap:9px;font:600 21px var(--serif);color:var(--ink);text-decoration:none}
#nav .brand svg{width:30px;height:30px}
#nav .sp,#nav .spacer{flex:1}
#nav a{color:var(--ink-2);text-decoration:none;font-size:14px;font-weight:500;white-space:nowrap}
#nav .btn{padding:10px 20px}
@media(max-width:640px){
 .grid-2,.role-cards,.trend-grid,.feed{grid-template-columns:1fr}
 .tc-img{height:200px}.photo{height:300px}
 table.data{display:block;overflow-x:auto}
 .container,.page-head{padding:20px 16px}
 .pick-bar{width:calc(100vw - 20px);justify-content:space-between}
 .pick-bar .face-stack{display:none}
 #nav{gap:10px;padding:10px 14px}#nav .brand{font-size:1.05rem}#nav .brand svg{width:26px;height:26px}
}

/* ═══════════ SCHEDULING (windows offered by her, picked by him, locked by her) ═══════════ */
const DAY = 86400000;
const SLOT_PRESETS = [
  {from:[18,0],  to:[20,30], label:"6:00 – 8:30 PM"},
  {from:[19,0],  to:[21,30], label:"7:00 – 9:30 PM"},
  {from:[19,30], to:[22,0],  label:"7:30 – 10:00 PM"},
  {from:[19,0],  to:[22,0],  label:"Evening, flexible", flex:true},
];
function mkWin(offset, slot){
  const sp = SLOT_PRESETS[slot];
  const a = new Date(Date.now()+offset*DAY); a.setHours(sp.from[0],sp.from[1],0,0);
  const b = new Date(Date.now()+offset*DAY); b.setHours(sp.to[0],sp.to[1],0,0);
  return {id:"w"+offset+"s"+slot, start:a.toISOString(), end:b.toISOString(), flex:!!sp.flex};
}
const wDay  = w => new Date(w.start).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
const wTime = w => w.flex ? "Evening, flexible"
  : new Date(w.start).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}) + " – " + new Date(w.end).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
const wWhen = iso => new Date(iso).toLocaleString("en-US",{weekday:"short",month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});

/* ═══════════ VENUE HIGHLIGHTS + TRUST BADGES ═══════════ */
const allVenues = () => VENUES.concat(DB.customVenues || []);
function sendChat(mid){
  const me = user(DB.session); if(!me) return;
  const m = DB.matches.find(x=>x.id===mid); if(!m || (m.womanId!==me.id && m.manId!==me.id)) return;
  const el = $("chat-in"); const text = (el ? el.value : "").trim().slice(0, 280);
  if(!text) return;
  m.chat = m.chat || [];
  m.chat.push({from: me.id, text, at: new Date().toISOString()});
  save(); render();
}
function chatHTML(m, me){
  const msgs = m.chat || [];
  const isMine = f => me && f === me.id;
  return `<div class="card" style="margin-top:20px;text-align:left">
    <span class="eyebrow" style="font-size:10px">Coordinate the night</span>
    <ul class="priv-list">
      <li>Your number is never given out — not to your date, not to anyone</li>
      <li>Everything runs right here until you decide otherwise</li>
      <li>Sharing your number is always your call, never a requirement</li>
      <li>Reminders and check-ins come from WannaGo, never from their phone</li>
    </ul>
    <div class="chat-box">${msgs.length ? msgs.map(c=>`<div class="chat-msg ${isMine(c.from)?"mine":""}"><span class="chat-b">${esc(c.text)}</span><span class="chat-t">${esc(user(c.from).name.split(" ")[0])} · ${new Date(c.at).toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}</span></div>`).join("")
      : `<p class="small" style="text-align:center;padding:14px 0;color:var(--muted)">Say hi — you already have plans. "Running late", "I'm in the red dress", "they're holding our table."</p>`}</div>
    ${me && (m.womanId===me.id || m.manId===me.id) ? `<div style="display:flex;gap:8px;margin-top:12px"><input id="chat-in" class="input" style="margin:0" placeholder="Message ${esc(user(m.womanId===me.id?m.manId:m.womanId).name.split(" ")[0])}…" maxlength="280" onkeydown="if(event.key==='Enter')sendChat('${m.id}')"><button class="btn btn-primary" onclick="sendChat('${m.id}')">${I.send}</button></div>`:``}
  </div>`;
}
function logEmail(toId, subject, preview, kind){
  DB.emails = DB.emails || [];
  DB.emails.unshift({id:"e"+(DB.emails.length+1), toId, subject, preview, kind:kind||"transactional", at:new Date().toISOString()});
  if(DB.emails.length > 40) DB.emails.length = 40;
}
function guestPickBar(){
  const n = (DB.guestList||[]).length;
  if(DB.session || !n) return "";
  const wanting = DB.users.filter(u => u.role!=="admin" && (u.wishlist||[]).some(v => DB.guestList.includes(v)));
  const ready = n >= 3;
  return `<div class="pick-bar">
    ${ready && wanting.length ? `<span class="face-stack" style="margin-right:0">${wanting.slice(0,4).map(u=>avatar(u,30)).join("")}</span>` : I.heartF.replace('class="icon"','class="icon sm" style="color:var(--pink)"')}
    <span style="font-size:13.5px;line-height:1.35"><b>${n}</b> on your list${ready ? ` · <b>${wanting.length}</b> ${wanting.length===1?"person wants":"people want"} these tables` : ` — pick ${3-n} more`}</span>
    ${ready ? `<a class="btn btn-primary btn-sm" href="register.html">See who else wants in ${I.chev}</a>`
            : `<button class="btn btn-sm" style="border:1px solid rgba(255,255,255,.35);background:transparent;color:#fff;white-space:nowrap" onclick="const el=document.getElementById('pick'); if(el) el.scrollIntoView({behavior:'smooth'})">Keep picking</button>`}
  </div>`;
}
function wishWhenSet(vid, val){ const me = user(DB.session); if(!me) return; me.wishWhen = me.wishWhen || {}; me.wishWhen[vid] = val; save(); render(); }
const whenOf = (u, vid) => (u && u.wishWhen && u.wishWhen[vid]) || "any";
function proposeWins(her, vid){
  const nd = t => { const d = (t - new Date().getDay() + 7) % 7; return d === 0 ? 7 : d; };
  const pref = whenOf(her, vid);
  if(pref === "weekends")   return [mkWin(nd(5),2), mkWin(nd(6),2), mkWin(nd(6)+7,1)];
  if(pref === "weeknights") return [mkWin(nd(2),1), mkWin(nd(3),1), mkWin(nd(4),2)];
  return [mkWin(3,1), mkWin(5,2), mkWin(9,2)];
}
const vById = id => VENUES.find(v=>v.id===id) || (DB.customVenues||[]).find(v=>v.id===id);
function addVenue(){
  const me = user(DB.session); if(!me) return;
  const name = ($("nv-name") ? $("nv-name").value : "").trim();
  const area = ($("nv-area") ? $("nv-area").value : "").trim();
  if(!name){ toast("Give the place a name"); return; }
  DB.customVenues = DB.customVenues || [];
  const dupe = allVenues().find(v => v.name.toLowerCase() === name.toLowerCase());
  if(dupe){ if(!(me.wishlist||[]).includes(dupe.id)) me.wishlist.push(dupe.id); save(); toast("Already on WannaGo — hearted it for you"); render(); return; }
  const id = "vc" + (DB.customVenues.length + 1);
  DB.customVenues.push({id, name, addr: (area || "Dallas") + ", TX", tags: ["Member added"], photo: "", partner: false});
  me.wishlist = me.wishlist || []; me.wishlist.push(id);
  save(); toast("Added — " + name + " is on your list"); render();
}

  const g = grads[u.g ?? 0], init = u.name.split(" ").map(w=>w[0]).slice(0,2).join("");
  const img = u.photo ? `<img src="${u.photo}" alt="${esc(u.name)}" loading="lazy" onerror="this.remove()">` : "";
  return `<div class="avatar ${ring||""}" style="width:${size}px;height:${size}px;font-size:${Math.round(size*.36)}px;background:linear-gradient(135deg,${g[0]},${g[1]})">${init}${img}</div>`;
}

  radial-gradient(circle at 20% 85%, rgba(7,7,14,.35), transparent 55%),
  linear-gradient(135deg,${g[0]},${g[1]})`; }

  const img = u.photo ? `<img class="ph-img" src="${u.photo}" alt="${esc(u.name)}" loading="lazy" onerror="this.remove()">` : "";
  return `<div class="photo" style="${photoBG(u)}">${img}<div class="scrim"></div>

<h4>3. Invitations and the attendance commitment</h4><p>Sending an invitation is a commitment to attend if it is accepted. To make that commitment real, when you send an invitation you authorize us to place a temporary authorization ("show-up hold," currently $99) on your payment card through our payment processor. A hold is not a charge: no funds are collected, and if your invitation is declined or expires within 5 days, the hold is released automatically.</p>
<h4>4. WannaGo never handles your meal</h4><p>You pay the restaurant directly, however you normally would — your card, cash, or otherwise. WannaGo is never a party to the meal transaction, sets no menu prices, and collects no payment on any venue's behalf. Your payment obligations at a venue are between you and that venue, and any dispute about a meal must be resolved with the venue.</p>
<h4>5. Cancellation and no-shows</h4><p>You may cancel a confirmed date free of charge up to 24 hours before its scheduled time, in the app. Inside 24 hours, or if you fail to appear, the other member may report a no-show. Before any charge, we notify you and give you at least 24 hours to respond, plus a grace window on the night itself. A missed check-in alone never results in a charge; a charge occurs only when a no-show is reported and you do not respond. On a confirmed no-show, we may capture a portion of your show-up hold as a no-show fee — between 50% and 100% depending on how much notice you gave — and the reporting member's service fee is refunded. At launch, captured no-show fees are retained by WannaGo; we may later share a portion with the member who was stood up, including as instant dining credit, and will update these terms when we do.</p>
<h4>6. Check-in</h4><p>Both members are asked to confirm attendance on the night through the app. Checking in is how holds are released promptly; it is each member's responsibility, and we send reminders to make it one tap.</p>
<h4>7. Repeated no-shows</h4><p>Confirmed no-shows count as strikes. Three strikes within 12 months results in suspension; continued abuse results in removal. We may also restrict accounts pending review of reported conduct.</p>
<h4>8. Service fee</h4><p>Where applicable, WannaGo charges a service fee (currently 12% of the show-up hold) when an invitation is accepted. Fees are shown before you send, and are automatically refunded if your confirmed date does not occur because of the other member's no-show.</p>
<h4>9. Payment authorizations</h4><p>Card information is collected and stored by our payment processor, Stripe — WannaGo never stores your card number. By providing a card, you represent that you are authorized to use it and that sufficient credit is available for the hold. You agree to receive notifications about holds, releases, and any no-show reports affecting your account.</p>
<h4>10. Member conduct</h4><p>No harassment, solicitation, or commercial activity. WannaGo may not be used to offer or seek paid companionship of any kind; asking another member for money or gifts in any form results in immediate removal. A declined invitation is a complete answer.</p>
<h4>11. Subscriptions and promotions</h4><p>If subscription plans are offered, pricing, trials, and promotional discounts are stated at signup and may change with notice. Cancel any time; access continues through the paid period.</p>
<h4>12. Venue information</h4><p>Venue names, photos, and details come from third-party services (including Google) and from member activity. We do not guarantee availability, pricing, or reservations. Trending rankings reflect member lists; sponsored placement, if any, is labeled.</p>
<h4>13. Your interactions are yours</h4><p>Members are solely responsible for their interactions with other members and with venues, on or off the platform. To the maximum extent permitted by law, you release WannaGo, Inc. from claims arising out of those interactions. Our total liability is limited to the fees you paid us in the 12 months before a claim.</p>
<h4>14. Disputes</h4><p>These terms are governed by Texas law. Disputes are resolved by binding individual arbitration in Dallas County, Texas, and you waive participation in class actions, except that qualifying claims may be brought in small-claims court.</p>
<h4>15. Changes and termination</h4><p>We may update these terms with notice in the app; continued use means acceptance. We may suspend or terminate accounts that violate these terms. You may delete your account at any time.</p>`},
privacy: {title:"Privacy", body:`
<h4>What we collect</h4><p>Profile details you provide (name, age, photos, bio, interests), your venue list and activity (invitations, check-ins), approximate city for local results, and device/usage data. Payment cards are collected and stored by Stripe, our payment processor — WannaGo never stores your card number.</p>
<h4>How we use it</h4><p>To operate the service: showing overlap-based matches, computing trending venues (always as aggregate counts, never revealing your individual list), sending reminders, preventing fraud and abuse, and improving the product.</p>
<h4>What others see</h4><p>Your profile is visible to members you can match with. Your venue list is private; another member sees only the specific venues that appear on both of your lists, and only after an overlap exists. Check-in status is visible only to your confirmed date. Your phone number is never shown to other members.</p>
<h4>Who we share with</h4><p>Service providers acting for us: Stripe (payments), our hosting and SMS providers, and Google (venue data, maps). We do not sell personal information. We disclose data if required by law or to protect members' safety.</p>
<h4>Your choices</h4><p>Edit or delete your profile and list at any time. Account deletion removes your profile and list; records required for payment, safety, or legal purposes are retained as required. Contact privacy@wannago.app for access or deletion requests.</p>
<h4>Safety-related data</h4><p>No-show reports, blocks, and abuse reports are retained to protect the community even after the reporting account closes.</p>`},
guidelines: {title:"Guidelines", body:`
<h4>Be who your photos say you are</h4><p>Real, recent photos of you. Verification exists so nobody wastes an evening on a stranger who doesn't exist.</p>
<h4>Show up</h4><p>The entire point. Accept only when you mean it; cancel free up to 24 hours before if life happens. A confirmed no-show costs the hold and counts as a strike — three strikes in 12 months and your account is suspended.</p>
<h4>The table is the deal</h4><p>An invitation is dinner at a place you both want to try. It is never an offer or expectation of anything else. Asking for money, gifts, or "compensation" in any form is an immediate ban.</p>
<h4>Respect the no</h4><p>A pass is a complete answer. Repeated invitations to someone who passed, or contact outside the app without consent, is harassment.</p>
<h4>No commercial activity</h4><p>No promotion, solicitation, sugar-dating, escorting, or link-dropping. This is a place to go to dinner.</p>
<h4>Report what's wrong</h4><p>Reporting tools are being built into the beta. Until then, contact safety@wannago.app — reports are confidential.</p>`},
safety: {title:"Safety", body:`
<h4>Built-in protections</h4><p>Every date happens in a public restaurant — that is the product. Profiles are photo-verified. Invitations require a financial commitment, which filters out people who aren't serious. Both parties confirm attendance.</p>
<h4>Your phone number stays yours</h4><p>Members never see your number. All coordination happens in the app, reminders come from WannaGo, and sharing your number with a date is always your choice — never a requirement of using the service.</p>
<h4>Before you go</h4><p>Tell a friend where you're going and who with — the ticket screen is easy to screenshot. Look up the venue. Arrange your own transportation there and back.</p>
<h4>At the table</h4><p>You owe nobody anything — not affection, not your time past dessert, not a second date. The hold is his commitment to show up, never a claim on you. If anything feels off, leave; staff can help.</p>
<h4>What verification means — and doesn't</h4><p>Photo verification confirms a profile matches a real person's face. It is not a background check and cannot predict behavior. Trust your instincts over any badge.</p>
<h4>If something goes wrong</h4><p>In an emergency, call 911 first. Then tell us: safety@wannago.app. Reports of harassment or misconduct lead to investigation and removal, and we cooperate with law enforcement.</p>`}
};

function initLanding(){
  if (!("IntersectionObserver" in window)) { document.querySelectorAll(".reveal").forEach(el=>el.classList.add("in")); return; }
  const io = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); } }), {threshold:.18});
  document.querySelectorAll(".reveal").forEach(el => io.observe(el));
}

const firstName = () => { const n=(REG.name||"").trim().split(/\s+/)[0]||""; return n.length>1 ? n[0].toUpperCase()+n.slice(1) : ""; };
const cleanHandle = s => String(s||"").toLowerCase().replace(/[^a-z0-9_]/g,"").slice(0,15);
function handleTaken(h){ return DB.users.some(u=>u.handle && u.handle.toLowerCase()===h) || RESERVED.includes(h); }
function suggestHandles(){
  const base = cleanHandle((REG.name||"").split(" ")[0]) || "you";
  const last = cleanHandle((REG.name||"").split(" ")[1]||"");
  const out=[];
  [base, last?base+last[0]:base+"_", base+(new Date().getFullYear()%100), last?base+"."+last:base+"1"].forEach(c=>{
    const h=cleanHandle(c); if(h && !handleTaken(h) && !out.includes(h)) out.push(h);
  });
  let n=1; while(out.length<3){ const h=cleanHandle(base+n); if(!handleTaken(h)&&!out.includes(h)) out.push(h); n++; if(n>50)break; }
  return out.slice(0,3);
}
function handleCheck(){
  const inp=$("q-handle"); if(!inp) return;

  wrap.classList.remove("ok","bad"); stat.className="hstat idle"; mark.textContent="";

let uploaded = 0;
let uploadedPhotos = [];
function compressImage(file, cb){
  const r = new FileReader();
  r.onload = () => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, 900 / Math.max(img.width, img.height));
      const c = document.createElement("canvas");
      c.width = Math.round(img.width*scale); c.height = Math.round(img.height*scale);
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      cb(c.toDataURL("image/jpeg", .82));
    };
    img.onerror = () => toast("Couldn't read that image");
    img.src = r.result;
  };
  r.readAsDataURL(file);
}
function pickPhotos(){ if($("ph-file")) $("ph-file").click(); }
function regAddPhotos(files){
  [...files].slice(0, 6 - uploadedPhotos.length).forEach(f => compressImage(f, url => { uploadedPhotos.push(url); paintUploads(); }));
}
function removeUpload(i){ uploadedPhotos.splice(i,1); paintUploads(); }

    + (uploadedPhotos.length<6?`<button type="button" class="up-add" onclick="pickPhotos()" aria-label="Add photo">+</button>`:"");

let draftWins = {};
let calShift = 0;
const CAL_HORIZON = 92;
const dKey = d => d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
function mkWinDate(key, slot){
  const sp = SLOT_PRESETS[slot], q = key.split("-").map(Number);
  const a = new Date(q[0], q[1]-1, q[2], sp.from[0], sp.from[1], 0, 0);
  const b = new Date(q[0], q[1]-1, q[2], sp.to[0], sp.to[1], 0, 0);
  return {id:"w"+key+"s"+slot, start:a.toISOString(), end:b.toISOString(), flex:!!sp.flex};
}
function winGridHTML(){
  const today = new Date(); today.setHours(0,0,0,0);
  const maxD = new Date(today.getTime() + CAL_HORIZON*DAY);
  const base = new Date(today.getFullYear(), today.getMonth()+calShift, 1);
  const y = base.getFullYear(), mo = base.getMonth();
  const nextOff = new Date(y, mo+1, 1) > maxD;
  let out = `<div class="cal-nav">
    <button type="button" class="cal-btn" onclick="calMove(-1)" ${calShift<=0?"disabled":""}>&#8249;</button>
    <span class="cal-title">${base.toLocaleDateString("en-US",{month:"long",year:"numeric"})}</span>
    <button type="button" class="cal-btn" onclick="calMove(1)" ${nextOff?"disabled":""}>&#8250;</button>
  </div><div class="win-grid">`;
  ["S","M","T","W","T","F","S"].forEach(l => out += `<span class="dh">${l}</span>`);
  for(let i=0;i<new Date(y,mo,1).getDay();i++) out += `<span></span>`;
  const days = new Date(y, mo+1, 0).getDate();
  for(let d=1; d<=days; d++){
    const dt = new Date(y, mo, d), key = dKey(dt);
    const off = dt <= today || dt > maxD;
    out += `<span class="d ${draftWins[key]!=null?"sel":""} ${off?"off":""}"${off?"":` onclick="toggleWin('${key}')"`}>${d}</span>`;
  }
  return out + `</div>`;
}
function winRowsHTML(){
  return Object.keys(draftWins).sort().map(key=>{
    const q = key.split("-").map(Number), d = new Date(q[0], q[1]-1, q[2]);
    return `
    <div class="win-row">
      <span style="display:flex;gap:8px;align-items:center;font-weight:500;font-size:14px">${I.cal.replace('class="icon"','class="icon sm" style="color:var(--pink)"')} ${d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</span>
      <select class="win-sel" onchange="setWinSlot('${key}',this.value)">${SLOT_PRESETS.map((sp,i)=>`<option value="${i}" ${draftWins[key]===i?"selected":""}>${sp.label}</option>`).join("")}</select>
    </div>`;
  }).join("");
}
function paintWins(){ if($("win-cal")){ $("win-cal").innerHTML=winGridHTML(); $("win-rows").innerHTML=winRowsHTML(); } }
function calMove(n){ calShift = Math.max(0, calShift + n); paintWins(); }
function toggleWin(key){
  if(draftWins[key]!=null) delete draftWins[key];
  else { if(Object.keys(draftWins).length>=5){ toast("Five evenings max"); return; } draftWins[key]=1; }
  paintWins();
}
function setWinSlot(key,v){ draftWins[key]=+v; }

let finalPick = null;
function manWins(p){ return (p.windows||[]).filter(w=>!p.picks || !p.picks.length || p.picks.includes(w.id)); }
function finalWin(p){ const ws=manWins(p); return ws.find(w=>w.id===finalPick) || ws[0] || null; }
function pdWinHTML(p){
  const sel = finalWin(p);
  return manWins(p).map(w=>`
    <div class="win-pick pick-r ${sel&&sel.id===w.id?"on":""}" onclick="setFinal('${w.id}')">
      <span class="box"></span>
      <div style="flex:1"><div style="font-weight:500;font-size:14px">${wDay(w)}</div><div class="small">${wTime(w)}</div></div>
    </div>`).join("");
}
function setFinal(wid){ finalPick = wid; render(); }

const mech = () => DB.mech || "invite";
function setMech(m){ DB.mech = m; save(); toast(m==="invite" ? "Mechanic: invitations" : "Mechanic: date posts"); render(); }
const overlapV = (a,b) => (a.wishlist||[]).filter(v => (b.wishlist||[]).includes(v));
function wishToggle(vid){
  const me = user(DB.session);
  if(!me){
    DB.guestList = DB.guestList || [];
    const gi = DB.guestList.indexOf(vid);
    if(gi>-1) DB.guestList.splice(gi,1); else DB.guestList.push(vid);
    save(); render(); return;
  }
  me.wishlist = me.wishlist || [];
  const i = me.wishlist.indexOf(vid);
  if(i>-1) me.wishlist.splice(i,1); else me.wishlist.push(vid);
  save(); render();
}

let acceptWinSel = {};
function invitesSentThisWeek(uid){
  const wk = Date.now() - 7*DAY;
  return DB.invites.filter(i => i.manId===uid && new Date(i.at).getTime() > wk).length;

function inviteOpen(wid){ inviteFor = (inviteFor===wid ? null : wid); render(); }
function inviteSend(womanId){
  const me = user(DB.session), w = user(womanId);
  const errs = [];
  if(pricingMode()!=="subscription" && !fullyVerified(me)) errs.push("Complete ID and background verification to send invitations.");
  if(pricingMode()==="membership" && !me.member) errs.push("A WannaGo membership ($" + PRICING.memberFee + " one-time) is required to invite.");
  if(pricingMode()==="subscription" && !me.sub) errs.push("An active WannaGo subscription ($" + PRICING.subMen + "/month) is required to invite.");
  if(invitesSentThisWeek(me.id) >= 3) errs.push("You have used all 3 invitations this week — quality over quantity.");
  const vid = $("inv-venue") ? $("inv-venue").value : null;
  if(!vid || !overlapV(me,w).includes(vid)) errs.push("Pick a place from your shared list.");
  const amt = PRICING.hold;
  if(errs.length){ if($("inv-err")) $("inv-err").innerHTML = errs.map(e=>`<div class="err-msg">${e}</div>`).join(""); return; }
  DB.invites.push({id:"i"+(DB.invites.length+1), manId:me.id, womanId, venueId:vid, amount:amt, fee:calcFee(amt),
    msg:($("inv-msg")?$("inv-msg").value.trim():""), windows:proposeWins(w, vid), status:"pending", at:new Date().toISOString()});
  const sentInv = DB.invites[DB.invites.length-1];
  logEmail(womanId, "You have an invitation 💌 — " + (vById(sentInv.venueId)||{}).name, me.name.split(" ")[0] + " wants to take you to " + (vById(sentInv.venueId)||{}).name + ". It's on your list too. 3 evenings proposed — you pick.", "transactional");
  save(); inviteFor = null;
  toast("Invitation sent — table on hold"); render();
}

function inviteAccept(iid){
  const i = DB.invites.find(x=>x.id===iid); if(!i || i.status!=="pending") return;
  const v = vById(i.venueId);
  const w = i.windows.find(x=>x.id===acceptWinSel[iid]) || i.windows[0];
  const d = new Date(w.start); if(w.flex) d.setHours(19,30,0,0);
  const post = {id:"p"+(DB.posts.length+1), womanId:i.womanId, venue:JSON.parse(JSON.stringify(v)), idea:"An evening at "+v.name+" — his invitation, her yes.", min:i.amount, max:i.amount, windows:i.windows, picks:i.windows.map(x=>x.id), status:"matched", fundedBy:i.manId, amount:i.amount, fee:i.fee, created:i.at};
  DB.posts.push(post);
  const m = {id:"m"+(DB.matches.length+1), postId:post.id, womanId:i.womanId, manId:i.manId, when:d.toISOString(), checkin:{w:false,m:false}, at:new Date().toISOString()};
  DB.matches.push(m); i.status = "accepted";
  logEmail(i.manId, "It's a date 🎉 " + user(i.womanId).name.split(" ")[0] + " said yes", user(i.womanId).name.split(" ")[0] + " picked " + wWhen(m.when) + " at " + v.name + ". Your $" + PRICING.hold + " hold stays until you both check in. Table's on you.", "transactional");

  go("#/match/"+m.id);
  bookForMatch(m.id);   // <- the guy invited, she clicked yes: reserve the table NOW
}

function checkIn(mid, k){
  (function(){ const m0 = DB.matches.find(x=>x.id===mid); if(m0 && m0.checkin && !(m0.checkin.w && m0.checkin.m)){

    }
  }})();
  const m = DB.matches.find(x=>x.id===mid); if(!m) return;
  m.checkin = m.checkin || {w:false, m:false}; m.checkin[k] = true; save();

function approve(postId){

  const m={id:"m"+(DB.matches.length+1), postId, womanId:p.womanId, manId:p.fundedBy, when, checkin:{w:false,m:false}, at:new Date().toISOString()};

  go("#/match/"+m.id);
}
function decline(postId){

/* ============================================================
   TABLE BOOKING LAYER
   Mirrors the Unified Commerce API shape used by real providers:
     location -> availability (read-only) -> reservation (write path)
   Reservation lifecycle: PENDING | CONFIRMED | CANCELLED | NO_SHOW | COMPLETED

   Provider capabilities (verified July 2026):
     sevenrooms : full CRUD + 300s hold  -> instant confirm
     opentable  : create only            -> instant confirm, no programmatic cancel
     resos      : create only            -> instant confirm
     yelp       : create only            -> instant confirm
     tock       : NO create via API      -> concierge queue
     none       : no reservation system  -> concierge queue (phone)

   Swap SIM_* calls for real fetch() against your provider connection.
   ============================================================ */
const PROVIDERS = {
  sevenrooms:{label:"SevenRooms", create:true, hold:true, cancel:true, holdSec:300},
  opentable: {label:"OpenTable",  create:true, hold:false, cancel:false},
  resos:     {label:"resOS",      create:true, hold:false, cancel:true},
  yelp:      {label:"Yelp",       create:true, hold:false, cancel:false},
  tock:      {label:"Tock",       create:false,hold:false, cancel:false},
  none:      {label:"Direct",     create:false,hold:false, cancel:false}
};
const bSys = v => (v && v.booking && v.booking.system) || "none";
const canAutoBook = v => { const p=PROVIDERS[bSys(v)]; return !!(p && p.create) || allocLeft(v)>0; };
function allocLeft(v){ if(!v||!v.booking) return 0; const used=(DB.alloc&&DB.alloc[v.id])||0; return Math.max(0,(v.booking.allocation||0)-used); }
function allocTake(v){ DB.alloc=DB.alloc||{}; DB.alloc[v.id]=((DB.alloc[v.id])||0)+1; }

const sleep = ms => new Promise(r=>setTimeout(r,ms));
const resCode = sys => (sys==="sevenrooms"?"SR-":sys==="opentable"?"OT-":sys==="resos"?"RS-":"WG-")+Math.random().toString(36).slice(2,7).toUpperCase();

/* SIM: stands in for GET /commerce/{conn}/availability */
async function SIM_searchAvailability(venue, whenISO){
  await sleep(420);
  const hour = new Date(whenISO).getHours();
  // Partner allocation always has a table. Otherwise peak hours are tight.
  if(allocLeft(venue)>0) return {slots:[{start:whenISO, type:"book", source:"allocation"}]};
  const tight = (hour>=19 && hour<=20);
  const open = !tight || Math.random() > 0.45;
  return open ? {slots:[{start:whenISO, type:"book", source:bSys(venue)}]} : {slots:[]};
}
/* SIM: POST hold_reservation (SevenRooms returns hold_duration_sec: 300) */
async function SIM_hold(venue, slot){ await sleep(300); return {holdId:"h_"+Date.now(), holdSec:PROVIDERS[bSys(venue)].holdSec||300}; }
/* SIM: POST /commerce/{conn}/reservation */
async function SIM_createReservation(venue, slot, party){
  await sleep(520);
  return {status:"CONFIRMED", code:resCode(slot.source==="allocation"?"alloc":bSys(venue)), size:party, start:slot.start};
}

/* Try adjacent times if the exact slot is gone */
function nearbySlots(whenISO){
  const base=new Date(whenISO);
  return [-30,30,-60,60].map(min=>new Date(base.getTime()+min*60000).toISOString());
}

async function bookForMatch(matchId){
  const m = DB.matches.find(x=>x.id===matchId); if(!m) return;
  const p = DB.posts.find(x=>x.id===m.postId); const v = p.venue;
  const sys = bSys(v), prov = PROVIDERS[sys];

  m.res = {status:"searching", system:sys}; save(); render();

  // Providers with no create endpoint (Tock, phone-only) -> concierge
  if(!prov.create && allocLeft(v)===0){
    m.res = {status:"concierge", system:sys, at:new Date().toISOString()};
    save(); render();
    logEmail(m.manId, "We're securing your table at "+v.name, "No instant booking at this venue. Our team is confirming your table and you'll have the confirmation within 2 hours.", "transactional");
    return;
  }

  const attempts = [m.when, ...nearbySlots(m.when)];
  for(let i=0;i<attempts.length;i++){
    const when = attempts[i];
    const avail = await SIM_searchAvailability(v, when);
    if(!avail.slots.length) continue;
    const slot = avail.slots[0];

    if(prov.hold){
      const h = await SIM_hold(v, slot);
      m.res = {status:"held", system:sys, holdId:h.holdId, holdUntil:Date.now()+h.holdSec*1000, when};
      save(); render();
      await sleep(900); // stand-in for charging the $99 hold
    }
    const r = await SIM_createReservation(v, slot, 2);
    if(slot.source==="allocation") allocTake(v);
    m.when = when;
    m.res = {status:"confirmed", system:slot.source==="allocation"?"allocation":sys, code:r.code, at:new Date().toISOString(), moved:i>0};
    save(); render();
    const moved = i>0 ? " (moved to "+wWhen(when)+" — your original time was gone)" : "";
    logEmail(m.manId, "Table confirmed at "+v.name, "Confirmation "+r.code+moved+". Party of 2.", "transactional");
    logEmail(m.womanId, "Table confirmed at "+v.name, "Confirmation "+r.code+moved+". See you there.", "transactional");
    return;
  }

  m.res = {status:"concierge", system:sys, at:new Date().toISOString(), reason:"no availability"};
  save(); render();
  logEmail(m.manId, "We're finding you a table", "That night is full at "+v.name+". Our team is securing an alternative and will confirm within 2 hours.", "transactional");
}

/* Reservation state — a match is NOT a table until a booking is confirmed */
function resOf(m){ return m.res || {status:"unbooked"}; }
function resPanel(m, p, href, label){
  const r = resOf(m), v = p.venue, sys = bSys(v), prov = PROVIDERS[sys];
  const via = r.system==="allocation" ? "WannaGo reserved table" : (PROVIDERS[r.system]||{}).label || prov.label;

  if(r.status==="searching") return `<div class="res-box busy">
    <div class="res-hd"><span class="spin"></span> <b>Finding your table…</b></div>
    <div class="res-bd">Checking live availability at ${esc(v.name)} for ${m.when?wWhen(m.when):"your night"}.</div></div>`;

  if(r.status==="held") return `<div class="res-box busy">
    <div class="res-hd"><span class="spin"></span> <b>Table held — confirming</b></div>
    <div class="res-bd">${esc(v.name)} is holding your table for <b id="hold-t">5:00</b> while we place the hold on ${esc(user(m.manId).name.split(" ")[0])}'s card.</div>
    <script>(function(){var e=document.getElementById("hold-t"),u=${r.holdUntil||0};if(!e)return;var i=setInterval(function(){var s=Math.max(0,Math.round((u-Date.now())/1000));e.textContent=Math.floor(s/60)+":"+String(s%60).padStart(2,"0");if(s<=0)clearInterval(i);},250);})();<\/script></div>`;

  if(r.status==="confirmed") return `<div class="res-box ok">
    <div class="res-hd">${I.check} <b>Table confirmed</b></div>
    <div class="res-bd">${esc(v.name)} · ${m.when?wWhen(m.when):"time TBC"} · party of 2${r.moved?` <span class="res-moved">time adjusted — your first choice was gone</span>`:""}</div>
    <div class="res-code">Confirmation <b>${esc(r.code)}</b> · via ${esc(via)}</div>
    ${prov.cancel||r.system==="allocation"
      ? `<button class="btn btn-ghost btn-sm btn-block" style="margin-top:10px" onclick="resCancel('${m.id}')">Cancel this table</button>`
      : `<p class="small" style="margin-top:8px;color:var(--ink-3)">${esc(via)} doesn't allow app cancellation. Cancel through them, or tap below and our team handles it.</p>
         <button class="btn btn-ghost btn-sm btn-block" style="margin-top:8px" onclick="resConcierge('${m.id}')">Ask WannaGo to cancel</button>`}
  </div>`;

  if(r.status==="concierge") return `<div class="res-box warn">
    <div class="res-hd">${I.cal} <b>Our team is securing your table</b></div>
    <div class="res-bd">${esc(v.name)} ${prov.create?"is full that night":"doesn't offer instant booking"}. A human is on it and you'll both get the confirmation within 2 hours. ${esc(user(m.manId).name.split(" ")[0])}'s hold isn't charged until the table is confirmed.</div>
    <a class="btn btn-ghost btn-block" style="margin-top:12px" href="${href}" target="_blank" rel="noopener">${label} yourself instead</a>
    <div class="res-confirm">
      <input id="res-code" class="input" placeholder="Booked it yourself? Paste the confirmation" style="margin:10px 0 0">
      <button class="btn btn-secondary btn-block" style="margin-top:8px" onclick="resConfirm('${m.id}')">Save confirmation</button>
    </div>
  </div>`;

  // unbooked (shouldn't normally happen post-match) — offer manual path
  return `<div class="res-box warn">
    <div class="res-hd">${I.cal} <b>No table booked yet</b></div>
    <div class="res-bd">Nobody is holding a table at ${esc(v.name)} yet.</div>
    <button class="btn btn-primary btn-lg btn-block" style="margin-top:14px" onclick="bookForMatch('${m.id}')">${I.cal} Reserve the table now</button>
    <a class="btn btn-ghost btn-block" style="margin-top:8px" href="${href}" target="_blank" rel="noopener">${label}</a>
    <div class="res-confirm">
      <input id="res-code" class="input" placeholder="Paste confirmation number" style="margin:10px 0 0">
      <button class="btn btn-secondary btn-block" style="margin-top:8px" onclick="resConfirm('${m.id}')">Save confirmation</button>
    </div>
  </div>`;
}
function resCancel(matchId){
  const m = DB.matches.find(x=>x.id===matchId); if(!m) return;
  m.res = {status:"unbooked"}; save(); toast("Table cancelled"); render();
}
function resConcierge(matchId){
  const m = DB.matches.find(x=>x.id===matchId); if(!m) return;
  m.res = Object.assign({}, m.res, {status:"concierge", reason:"cancel requested"});
  save(); toast("Our team will handle the cancellation"); render();
}
function resConfirm(matchId){
  const m = DB.matches.find(x=>x.id===matchId); if(!m) return;
  const code = ($("res-code")||{}).value ? $("res-code").value.trim() : "";
  if(code.length<3){ toast("Enter the confirmation number from the restaurant"); return; }
  m.res = {status:"confirmed", code, at:new Date().toISOString()};
  save(); toast("Table confirmed — both of you can see it now"); render();
}
function resReset(matchId){
  const m = DB.matches.find(x=>x.id===matchId); if(!m) return;
  m.res = {status:"unbooked"}; save(); toast("Table cleared"); render();
}

      <button class="btn btn-primary btn-lg" style="flex:1" onclick="saveProfile()">Save changes</button>

};

function saveProfile(){
  const me = user(DB.session);
  const name = $("pr-name").value.trim(), age = +$("pr-age").value, bio = $("pr-bio").value.trim();
  const errs = [];
  if(!name) errs.push("Name is required.");
  if(!age || age < 18) errs.push("Age must be 18 or older.");
  const ints = [...document.querySelectorAll("#chip-grid .pill.on")].map(b=>b.textContent);
  me.diet = [...document.querySelectorAll("#diet-grid .pill.on")].map(b=>b.textContent);
  if(me.role === "funder" && !ints.length) errs.push("Keep at least one interest.");
  else me.interests = ints;
  if(errs.length){ $("pr-err").innerHTML = errs.map(e=>`<div class="err-msg">${e}</div>`).join(""); return; }
  me.name = name; me.age = age; me.bio = bio || "—";
  save(); toast("Profile saved"); render();
}

const FILE2PAGE = {"":"landing","landing.html":"landing","index.html":"landing","register.html":"register","register-woman.html":"register-woman","register-man.html":"register-man","login.html":"login","woman-dashboard.html":"woman","man-browse.html":"browse","fund-date.html":"fund","post-detail.html":"post","match-confirmed.html":"match","admin.html":"admin","trending.html":"trending","profile.html":"profile"};
const SCREENS = [["landing.html","Landing"],["trending.html","Trending tables"],["register.html","Register — choose role"],["register-woman.html","Register — woman"],["register-man.html","Register — man"],["login.html","Login"],["woman-dashboard.html","Woman dashboard"],["man-browse.html","Man browse feed"],["fund-date.html?post=p1","Fund a date"],["post-detail.html?post=p2","Post detail (her view)"],["match-confirmed.html","Match confirmed"],["profile.html","Edit profile"],["admin.html","Admin panel"]];
function render(){
  renderNav();
  const [file, qs] = location.hash.replace(/^#/,"").split("?");
  const page = FILE2PAGE[file] ?? "landing";
  const q = new URLSearchParams(qs || "");
  const app = $("app");
  switch(page){
    case "landing": app.innerHTML = P.landing(); initLanding(); break;
    case "trending": app.innerHTML = P.trending(); break;
    case "register": app.innerHTML = P.chooseRole(); break;
    case "register-woman": app.innerHTML = P.regWoman(); uploaded = 0; uploadedPhotos = []; break;
    case "register-man": app.innerHTML = P.regMan(); uploaded = 0; uploadedPhotos = []; break;
    case "login": app.innerHTML = P.login(); break;
    case "woman": app.innerHTML = P.woman(); break;
    case "browse": app.innerHTML = P.browse(); break;
    case "fund": app.innerHTML = P.fund(q.get("post")); break;
    case "post": app.innerHTML = P.post(q.get("post")); break;
    case "match": app.innerHTML = P.match(q.get("match")); break;
    case "admin": app.innerHTML = P.admin(); break;
    case "profile": app.innerHTML = P.profile(); break;
  }
  const sel = document.getElementById("screen-jump");

}
/* Same-page rerenders (hearts, picks, toggles) keep scroll; page changes scroll to top */
const __renderCore = render;
render = function(){
  const page = FILE2PAGE[location.hash.replace(/^#/,"").split("?")[0]] ?? "landing";
  const keep = page === window.__lastPage;
  window.__lastPage = page;
  const sy = window.scrollY || 0;
  __renderCore();
  try { window.scrollTo(0, keep ? sy : 0); } catch(e){}
};
document.addEventListener("click", e => {
  const a = e.target.closest("a[href]");
  if (!a) return;
  const h = a.getAttribute("href");
  if (h === "#"){ e.preventDefault(); return; }
  if (/^https?:/.test(h) || a.target === "_blank") return;
  if (h.includes(".html")){ e.preventDefault(); go(h); }
});
window.addEventListener("hashchange", render);

try { const t = sessionStorage.getItem("dateout-toast"); if (t){ sessionStorage.removeItem("dateout-toast"); setTimeout(()=>toast(t), 250); } } catch(e){}
